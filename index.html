<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KEYSTROKE — Precision keyboard supply</title>
  <meta name="description" content="A hot-swap keyboards, switches, and keycaps catalog — built as a fast, modular single-page application." />
  <meta name="theme-color" content="#0f1b2d" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml" />

  <!-- Preconnect + font loading kept minimal: two weights per family, swap strategy avoids invisible text -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap bar">
      <a href="/" class="logo">KEYSTROKE<span class="dot">.</span></a>
      <nav class="main-nav" aria-label="Primary">
        <a href="/">Home</a>
        <a href="/catalog">Catalog</a>
        <a href="/cart">Cart</a>
      </nav>
      <a href="/cart" class="cart-link" aria-label="View cart">
        Cart <span class="cart-count" data-cart-count style="display:none;">0</span>
      </a>
    </div>
  </header>

  <main id="app" role="main"></main>

  <footer class="site-footer">
    <div class="wrap" style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; width:100%;">
      <span>KEYSTROKE — demo capstone build</span>
      <span>No real payments are processed on this site</span>
    </div>
  </footer>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
